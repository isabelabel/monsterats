# Optional Docker deployment: app only (database is Turso, not bundled).
# 1. Put Turso + auth vars in a root `.env` (see .env.example and DEPLOY.md).
# 2. docker compose --profile prod up -d --build

services:
  web:
    profiles: ["prod"]
    build: .
    ports:
      - "3000:3000"
    environment:
      TURSO_DATABASE_URL: ${TURSO_DATABASE_URL:?Set TURSO_DATABASE_URL in .env}
      TURSO_AUTH_TOKEN: ${TURSO_AUTH_TOKEN:-}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?Set BETTER_AUTH_URL in .env}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?Set NEXT_PUBLIC_APP_URL in .env}
      BLOB_READ_WRITE_TOKEN: ${BLOB_READ_WRITE_TOKEN:-}
    volumes:
      - monsterats_uploads:/app/data/uploads

volumes:
  monsterats_uploads:
